<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    My Constellation — app icon source.
    White background + a single Sea Blue 5-point star, centered — Sea Blue is
    now the app's dominant brand color everywhere, including the icon.
  -->
  <rect width="512" height="512" fill="#FFFFFF"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8DCBD8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#8DCBD8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="256" r="150" fill="url(#glow)"/>
  <polygon
    fill="#8DCBD8"
    points="
      256,82
      285.7,199.4
      406.8,199.4
      309.5,270.6
      346.5,388
      256,316.8
      165.5,388
      202.5,270.6
      105.2,199.4
      226.3,199.4
    "/>
</svg>
