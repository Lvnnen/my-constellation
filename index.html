<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>My Constellation</title>
<meta name="description" content="日々を照らす、小さな星たちを集めて。好きなもの・楽しみにしていることだけを集める、あなただけの星座。" />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#8DCBD8" />
<meta name="color-scheme" content="light" />

<!-- iOS home screen behaviour -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Constellation" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="format-detection" content="telephone=no" />

<!-- Icons -->
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />

<!-- iOS splash screens (shown for a moment while the app launches from the home screen) -->
<link rel="apple-touch-startup-image" href="icons/splash-750x1334.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
<link rel="apple-touch-startup-image" href="icons/splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
<link rel="apple-touch-startup-image" href="icons/splash-1284x2778.png"
      media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />

<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Single source of truth for every icon in the app (stars, gear, drag grip).
     Reused everywhere via <use> so the whole app shares one visual language. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <!-- Filled 5-point star: used wherever a category's color needs to read clearly
       (chips, calendar day markers) — same shape as the app icon. -->
  <symbol id="star-soft" viewBox="0 0 512 512">
    <polygon points="256,82 285.7,199.4 406.8,199.4 309.5,270.6 346.5,388 256,316.8 165.5,388 202.5,270.6 105.2,199.4 226.3,199.4" />
  </symbol>
  <!-- Simple line-art gear for Settings. -->
  <symbol id="icon-gear" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </symbol>
  <!-- Drag-handle grip (six dots) for reordering categories. -->
  <symbol id="icon-grip" viewBox="0 0 24 24">
    <circle cx="9" cy="6" r="1.3"/><circle cx="9" cy="12" r="1.3"/><circle cx="9" cy="18" r="1.3"/>
    <circle cx="15" cy="6" r="1.3"/><circle cx="15" cy="12" r="1.3"/><circle cx="15" cy="18" r="1.3"/>
  </symbol>
</svg>

<!-- Launch splash: static markup so it paints before any JS runs. app.js fades + removes it. -->
<div class="oc-splash" id="splash">
  <svg class="oc-star-icon oc-splash-star" aria-hidden="true"><use href="#star-soft"></use></svg>
  <div class="oc-splash-text">My Constellation</div>
</div>

<div id="app" role="main"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
